---
- name: Remove unnecessary drivers
  ansible.builtin.lineinfile:
    path: "/etc/modprobe.d/disable-{{ item }}.conf"
    line: "install {{ item }} /bin/false"
    create: yes
    mode: "0644"
  loop:
    - algif_aead
    - esp4
    - esp6
    - firewire-core
    - rxrpc
    - thunderbolt

- name: Alpine - Update all packages to the latest version
  community.general.apk:
    available: true
    update_cache: true
    upgrade: true
  when: ansible_facts["os_family"] == 'Alpine'

- name: Alpine - Update all packages to the latest version
  community.general.apk:
    name:
      - curl
      - git
      - htop
      - open-vm-tools
      - prometheus-node-exporter
      - tmux
      - vim
      - zsh
      - zstd
    state: latest
    update_cache: true
  when: ansible_facts["os_family"] == 'Alpine'

- name: Debian - Update all packages to the latest version
  ansible.builtin.apt:
    cache_valid_time: 3600
    upgrade: full
  when: ansible_facts["os_family"] == 'Debian'

- name: Debian - Remove dependencies that are no longer required
  ansible.builtin.apt:
    autoremove: yes
    purge: yes
  when: ansible_facts["os_family"] == 'Debian'

- name: Debian - Clear cache
  ansible.builtin.apt:
    autoclean: yes
  when: ansible_facts["os_family"] == 'Debian'

- name: Debian - Install base packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - git
      - gnupg-agent
      - htop
      - open-vm-tools
      - prometheus-node-exporter
      - python3-debian
      - tmux
      - unattended-upgrades
      - vim-nox
      - zsh
      - zstd
    state: present
    update_cache: yes
  when: ansible_facts["os_family"] == 'Debian'

- name: Check if reboot is needed
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: system_stat_reboot_required

- name: Reboot
  ansible.builtin.reboot:
    post_reboot_delay: 60
    reboot_timeout: 180
  when: system_stat_reboot_required.stat.exists and not inventory_hostname in groups['data']

- name: Set default umask
  ansible.builtin.lineinfile:
    path: /etc/profile
    line: umask 0022
    create: yes
    mode: "0644"

- name: Add wheel group
  ansible.builtin.group:
    name: wheel
    state: present
